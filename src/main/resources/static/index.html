<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나무기술 환영 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 30%),
        linear-gradient(135deg, #07111f 0%, #0d1b2a 52%, #15324b 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(95px);
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -90px;
      left: -80px;
      background: #22c55e;
    }

    body::after {
      right: -90px;
      bottom: -110px;
      background: #3b82f6;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1180px;
      min-height: 700px;
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      border-radius: 32px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 56px;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 40px;
    }

    .logo-box {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 22px;
      padding: 20px 28px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.16);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }

    .logo-box img {
      display: block;
      width: 100%;
      max-width: 320px;
      max-height: 60px;
      height: auto;
      object-fit: contain;
    }

    .title {
      margin: 0;
      font-size: clamp(2.8rem, 5vw, 4.8rem);
      line-height: 1.22;
      letter-spacing: -0.04em;
      font-weight: 800;
      word-break: keep-all;
    }

    .title .line {
      display: block;
    }

    .title .line:first-child {
      color: #ffffff;
      margin-bottom: 8px;
    }

    .title .line:last-child {
      background: linear-gradient(90deg, #ffffff 0%, #d1fae5 45%, #bfdbfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtext {
      margin-top: 24px;
      font-size: 1.08rem;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.8);
      word-break: keep-all;
    }

    .right {
      position: relative;
      padding: 42px 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    }

    .chat-card {
      width: 100%;
      max-width: 430px;
      height: 560px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
    }

    .chat-title {
      font-size: 0.98rem;
      font-weight: 700;
      color: #ffffff;
    }

    .chat-body {
      flex: 1;
      padding: 22px 18px 26px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
      overflow: hidden;
    }

    .message {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 20px;
      font-size: 1rem;
      line-height: 1.7;
      word-break: keep-all;
      opacity: 0;
      transform: translateY(18px);
      animation: slideUp 0.6s ease forwards;
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
    }

    .message.left-msg {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border-top-left-radius: 8px;
    }

    .message.right-msg {
      align-self: flex-end;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #ffffff;
      border-top-right-radius: 8px;
    }

    .meta {
      margin-top: 6px;
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.58);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .left {
        padding: 38px 28px 24px;
      }

      .right {
        padding: 12px 20px 28px;
      }

      .chat-card {
        height: 500px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .left {
        padding: 24px 18px 12px;
      }

      .right {
        padding: 8px 14px 18px;
      }

      .logo-box {
        padding: 16px 18px;
        min-height: 84px;
      }

      .logo-box img {
        max-width: 240px;
        max-height: 48px;
      }

      .chat-card {
        height: 460px;
      }
    }
  </style>
</head>
<body>
  <section class="page">
    <div class="left">
      <div class="logo-wrap">
        <div class="logo-box">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnRUdS-9O8IIpB_Dxt3-Gi-f-DDYOrEF2paQ&s" alt="나무기술 로고" />
        </div>
      </div>

      <h1 class="title">
        <span class="line">나무기술에</span>
        <span class="line">오신 것을</span>
        <span class="line">진심으로 환영합니다</span>
      </h1>

      <div class="subtext">
        Welcome to NAMUTECH
      </div>
    </div>

    <div class="right">
      <div class="chat-card">
        <div class="chat-header">
          <span class="chat-dot"></span>
          <span class="chat-dot"></span>
          <span class="chat-dot"></span>
          <div class="chat-title">Welcome Message</div>
        </div>
        <div class="chat-body" id="chatBody"></div>
      </div>
    </div>
  </section>

  <script>
    const chatBody = document.getElementById('chatBody');

    const messages = [
      { type: 'left-msg', text: '안녕하세요. 현재 해당 소스코드 기반으로 pipeline 테스트를 진행 중입니다.', meta: 'NAMUTECH' },
      { type: 'right-msg', text: 'pipeline 테스트 중입니다.', meta: 'PIPELINE' },
      { type: 'left-msg', text: '정상 동작 여부를 확인하고 있습니다.', meta: 'NAMUTECH' }
    ];

    let currentIndex = 0;

    function addMessage() {
      if (currentIndex >= messages.length) {
        setTimeout(() => {
          chatBody.innerHTML = '';
          currentIndex = 0;
          addMessage();
        }, 2500);
        return;
      }

      const msg = messages[currentIndex];
      const wrapper = document.createElement('div');
      wrapper.className = `message ${msg.type}`;
      wrapper.innerHTML = `${msg.text}<div class="meta">${msg.meta}</div>`;
      chatBody.appendChild(wrapper);

      currentIndex += 1;
      setTimeout(addMessage, 1400);
    }

    addMessage();
  </script>
</body>
</html>
